services:
  postgres:
    image: postgres:16
    container_name: todo_postgres
    environment:
      POSTGRES_DB: todo_app
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
    container_name: todo_backend
    environment:
      PORT: 5000
      DATABASE_URL: postgres://todo_user:todo_password@postgres:5432/todo_app
      JWT_SECRET: change_this_secret_before_submission
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    container_name: todo_frontend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
